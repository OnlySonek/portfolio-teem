<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&S — Team Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="team-showcase.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        bebas: ['Bebas Neue', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-black overflow-hidden font-inter select-none">

    <!-- ===== TOP NAVBAR ===== -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-8 py-4">
        <div class="flex items-center gap-3">
            <span class="text-white font-bebas text-2xl tracking-widest">A<span id="nav-amp" class="transition-colors duration-500">&</span>S</span>
            <span class="text-white/30 text-xs tracking-[4px] uppercase font-inter">Team</span>
        </div>
        <button id="startBtn"
            class="relative overflow-hidden px-6 py-2.5 rounded-full text-sm font-semibold tracking-widest uppercase transition-all duration-300 border border-white/20 text-white hover:scale-105 active:scale-95"
            style="background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);">
            <span class="relative z-10">Start Creating</span>
            <div id="btn-shine" class="absolute inset-0 opacity-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full"></div>
        </button>
    </nav>

    <!-- ===== MAIN WRAPPER ===== -->
    <div class="w-full h-screen flex flex-col">

        <!-- ===== TOP SECTION: HERO ===== -->
        <div id="heroSection" class="relative flex-1 overflow-hidden transition-colors duration-700 cursor-pointer" style="background: #1a1a2e;">

            <!-- خلفية gradient ديناميكية -->
            <div id="heroBg" class="absolute inset-0 transition-all duration-700"
                style="background: radial-gradient(ellipse at 60% 50%, rgba(100,200,100,0.35) 0%, transparent 70%)"></div>

            <!-- Noise texture overlay -->
            <div class="absolute inset-0 opacity-[0.03]" style="background-image: url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><filter id=%22n%22><feTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22/></filter><rect width=%22200%22 height=%22200%22 filter=%22url(%23n)%22 opacity=%221%22/></svg>');"></div>

            <!-- BIG TYPOGRAPHY BEHIND CHARACTER -->
            <div id="bigText" class="absolute inset-0 flex items-center justify-center pointer-events-none overflow-hidden">
                <span class="font-bebas text-[22vw] leading-none text-white select-none tracking-tight"
                    style="opacity: 0.12; letter-spacing: -2px;">ABDELRHMAN</span>
            </div>

            <!-- CHARACTER IMAGE (مربعة مع depth) -->
            <div id="characterWrap" class="absolute inset-0 flex items-center justify-center">
                <div id="character" class="relative z-10">
                    <img id="charImg" src="member1.jpg" alt="Character"
                        class="h-[75vh] w-auto object-contain drop-shadow-2xl"
                        style="filter: drop-shadow(0 40px 80px rgba(0,0,0,0.6));">
                </div>
            </div>

            <!-- CARD: bottom right -->
            <div id="infoCard"
                class="absolute bottom-6 right-6 z-20 flex items-center gap-3 px-4 py-3 rounded-2xl border border-white/10"
                style="background: rgba(255,255,255,0.07); backdrop-filter: blur(20px);">
                <img id="cardThumb" src="member1.jpg" alt="thumb"
                    class="w-10 h-10 rounded-xl object-cover border border-white/20">
                <div>
                    <p id="cardName" class="text-white text-sm font-bold leading-tight">ABDELRHMAN</p>
                    <p id="cardLabel" class="text-white/40 text-xs tracking-widest uppercase">Front End Dev</p>
                </div>
                <div id="cardDot" class="w-2 h-2 rounded-full ml-2 transition-colors duration-500" style="background:#64c864;"></div>
            </div>

            <!-- PROGRESS BAR (auto switch timer) -->
            <div class="absolute bottom-0 left-0 right-0 z-30 h-[2px]" style="background:rgba(255,255,255,0.08);">
                <div id="progressBar" class="h-full" style="width:0%; background: linear-gradient(to right, var(--accent-color, #50c864), rgba(255,255,255,0.6));"></div>
            </div>

            <!-- CLICK HINT -->
            <div id="clickHint" class="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center gap-2 opacity-60">
                <span class="text-white/50 text-xs tracking-[4px] uppercase">Click to Switch</span>
                <div class="w-px h-6 bg-white/20 animate-pulse"></div>
            </div>

            <!-- PARTICLE CONTAINER -->
            <div id="particles" class="absolute inset-0 pointer-events-none z-20 overflow-hidden"></div>

            <!-- COUNTER -->
            <div class="absolute top-20 right-6 z-20 flex flex-col items-end gap-1">
                <span id="counterCurrent" class="font-bebas text-5xl text-white leading-none">01</span>
                <div class="w-8 h-px bg-white/30"></div>
                <span class="font-bebas text-xl text-white/30 leading-none">02</span>
            </div>

            <!-- DOTS INDICATOR -->
            <div class="absolute top-1/2 left-6 -translate-y-1/2 z-20 flex flex-col gap-2">
                <div class="dot-ind w-1.5 h-6 rounded-full bg-white transition-all duration-300" data-i="0"></div>
                <div class="dot-ind w-1.5 h-2 rounded-full bg-white/30 transition-all duration-300" data-i="1"></div>
            </div>
        </div>

        <!-- ===== BOTTOM SECTION: THE PROFESSIONALS ===== -->
        <div class="relative flex h-[38vh] overflow-hidden" style="background:#0a0a0a;">

            <!-- LEFT: The Designer -->
            <div id="designerPanel"
                class="relative flex-1 overflow-hidden flex flex-col items-center justify-center border-r border-white/5 cursor-pointer group">
                <div class="absolute inset-0 transition-all duration-500 opacity-0 group-hover:opacity-100"
                    style="background: radial-gradient(ellipse at center, rgba(255,100,100,0.1) 0%, transparent 70%)"></div>

                <!-- Video / Image placeholder -->
                <div class="relative w-full h-full overflow-hidden">
                    <img src="member1.jpg" alt="Designer"
                        class="w-full h-full object-cover opacity-60 transition-all duration-700 group-hover:opacity-80 group-hover:scale-105"
                        style="object-position: center top;">
                    <div class="absolute inset-0" style="background: linear-gradient(to top, #0a0a0a 0%, transparent 50%)"></div>
                </div>

                <!-- Label -->
                <div class="absolute bottom-5 left-0 right-0 flex flex-col items-center gap-1 z-10">
                    <span class="font-bebas text-3xl text-white tracking-[6px]">The Designer</span>
                    <span class="text-white/30 text-xs tracking-[3px] uppercase">UI / UX</span>
                </div>

                <!-- Dramatic overlay on hover -->
                <div id="designerFlash" class="absolute inset-0 bg-white opacity-0 pointer-events-none"></div>
            </div>

            <!-- RIGHT: The Developer -->
            <div id="developerPanel"
                class="relative flex-1 overflow-hidden flex flex-col items-center justify-center cursor-pointer group">
                <div class="absolute inset-0 transition-all duration-500 opacity-0 group-hover:opacity-100"
                    style="background: radial-gradient(ellipse at center, rgba(100,150,255,0.1) 0%, transparent 70%)"></div>

                <div class="relative w-full h-full overflow-hidden">
                    <img src="member2.jpg" alt="Developer"
                        class="w-full h-full object-cover opacity-60 transition-all duration-700 group-hover:opacity-80 group-hover:scale-105"
                        style="object-position: center top;">
                    <div class="absolute inset-0" style="background: linear-gradient(to top, #0a0a0a 0%, transparent 50%)"></div>
                </div>

                <div class="absolute bottom-5 left-0 right-0 flex flex-col items-center gap-1 z-10">
                    <span class="font-bebas text-3xl text-white tracking-[6px]">The Developer</span>
                    <span class="text-white/30 text-xs tracking-[3px] uppercase">Front End</span>
                </div>

                <div id="developerFlash" class="absolute inset-0 bg-white opacity-0 pointer-events-none"></div>
            </div>

            <!-- CENTER DIVIDER with icon -->
            <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-20
                        w-10 h-10 rounded-full border border-white/10 flex items-center justify-center"
                style="background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);">
                <span class="text-white/40 text-xs font-bebas">&</span>
            </div>
        </div>

    </div>

    <!-- ===== FLASH OVERLAY (camera shake) ===== -->
    <div id="flashOverlay" class="fixed inset-0 z-[999] pointer-events-none opacity-0"
        style="background: white;"></div>

    <script src="team-showcase.js"></script>
</body>
</html>
